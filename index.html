<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📋 貨物列車報單助手 (車班通用版)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 藍底黃字大標題 -->
    <div style="background: #002161; color: #f8c000; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-weight: bold; text-align: center; border-bottom: 4px solid #f8c000; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
        <span>📋 貨物列車報單助手</span>
    </div>

    <!-- 【新增】頂部車班切換選單（亮黃底色，方便大拇指秒選） -->
    <div class="card" style="background: #fff9db; border: 2px solid #fab005; padding: 10px; margin-bottom: 12px;">
        <label style="color: #f59f00; font-size: 0.8rem;">🚩 請選擇值勤車班 (切換後會自動刷新車站大表)</label>
        <select id="crewSelector" style="font-weight: bold; color: #002161; font-size: 1.05rem; border: 1px solid #fab005; background: #ffffff;">
            <option value="changhua">彰化車班組 (新竹貨 ⇄ 嘉義)</option>
            <option value="chiayi">嘉義車班組 (彰化 ⇄ 新左營 ⇄ 高雄)</option>
        </select>
    </div>

    <!-- 車次與日期卡片 -->
    <div class="card grid-2">
        <div>
            <label>車次</label>
            <input type="text" id="trainNo" value="7021">
        </div>
        <div>
            <label>日期 (民國年 / 月 / 日)</label>
            <div class="date-select-group">
                <select id="dateYear"></select>
                <select id="dateMonth"></select>
                <select id="dateDay"></select>
            </div>
        </div>
    </div>

    <div class="section-title">列車停靠站</div>
    
    <div id="stationContainer"></div>

    <button type="button" class="btn btn-secondary" id="btnAddStation">＋ 新增停靠站</button>
    <div id="errorNotice" style="display: none; background-color: #ffe5e5; border: 2px solid #e53e3e; color: #e53e3e; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; font-weight: bold; line-height: 1.5;"></div>

    <!-- 山海線開關：切換到嘉義版時會自動完全鎖定隱藏 -->
    <div id="directRouteSelector" style="display: none; background: #e6f0ff; border: 2px solid #1a5cff; padding: 12px; border-radius: 8px; margin: 15px 0 0 0; text-align: center; box-sizing: border-box;">
        <span id="directRouteTitle" style="font-weight: bold; color: #002161; display: block; margin-bottom: 8px; font-size: 0.95rem;">
            🧭 直達車運行線別確認
        </span>
        <div style="display: inline-flex; border-radius: 6px; overflow: hidden; border: 1px solid #1a5cff; width: 100%; max-width: 260px;">
            <button type="button" id="toggleSea" onclick="setDirectRoute('sea')" style="flex: 1; background: #1a5cff; color: white; border: none; padding: 10px; font-weight: bold; font-size: 0.95rem; cursor: pointer; margin: 0;">
                🌊 經由海線
            </button>
            <button type="button" id="toggleMountain" onclick="setDirectRoute('mountain')" style="flex: 1; background: #eeeeee; color: #333; border: none; padding: 10px; font-weight: bold; font-size: 0.95rem; cursor: pointer; margin: 0;">
                ⛰️ 經由山線
            </button>
        </div>
        <input type="hidden" id="currentDirectRoute" value="sea">
    </div>

    <button type="button" class="btn" id="btnCalc" style="background-color: #38a169; margin-top: 15px;">📊 生成報單對照數據</button>

    <!-- 對照彈出視窗 -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#0f3dbe;">抄寫對照表</h3>
            <p style="font-size:0.8rem;"><strong>車次：</strong><span id="resTrainNo"></span> | <strong>日期：</strong><span id="resDate"></span></p>
            
            <div class="table-responsive">
                <table class="result-table">
                    <thead>
                        <tr>
                            <th rowspan="2">站名</th>
                            <th colspan="2">連掛車數</th>
                            <th colspan="2">摘下車數</th>
                            <th colspan="2">差額車數</th>
                            <th rowspan="2">區間<br>里程</th>
                            <th colspan="2">貨車公里</th>
                        </tr>
                        <tr>
                            <th>重(1)</th><th>空(2)</th><th>重(3)</th><th>空(4)</th><th>重(5)</th><th>空(6)</th><th>重(8)</th><th>空(9)</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
            <button type="button" class="btn" id="btnCloseModal" style="margin-top: 15px; background-color: #4a5568;">關閉視窗</button>
        </div>
    </div>

    <script src="stations.js"></script>
    <script src="app.js"></script>
</body>
</html>
